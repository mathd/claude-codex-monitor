# ===================================================================
# Device: ESP32-S3-Touch-LCD-2.1 (Waveshare) — the home unit (HA/MQTT).
# Thin entry point: hardware in boards/lcd21.yaml, shared UI in
# common/ui.yaml, data transport in common/transport_ha.yaml.
# The 1.85B device (claude-monitor-185b.yaml) will reuse core/ui/transports
# with its own board file. See docs/V2_PLAN.md.
#
# Filename kept as claude-monitor.yaml on purpose: the ESPHome dashboard
# entry, the OTA target, and the HA device name all key off it.
# ===================================================================

substitutions:
  name: claude-monitor
  friendly_name: Claude Monitor
  # Tap-nav x thresholds (px, 480-wide panel): tap left of tap_prev_max =
  # previous tile, right of tap_next_min = next. Center stays for widgets.
  tap_prev_max: "100"
  tap_next_min: "380"

packages:
  core: !include common/core.yaml
  board: !include boards/lcd21.yaml
  ui: !include common/ui.yaml
  transport_ha: !include common/transport_ha.yaml
