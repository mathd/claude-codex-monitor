# ===================================================================
# Shared skeleton: chip, radio, API/OTA, time.
# Board hardware lives in boards/*.yaml, UI in common/ui.yaml,
# data transports in common/transport_*.yaml.
# Device files must define substitutions: name, friendly_name.
# ===================================================================

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100              # run late, after display + backlight are set up
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf          # display + PSRAM needs esp-idf, not arduino
  flash_size: 16MB

psram:
  mode: octal              # ESP32-S3R8 = octal PSRAM
  speed: 80MHz

logger:
  level: DEBUG

# --- WiFi: needed for OTA + HA. Creds in secrets.yaml (gitignored). ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:                       # fallback hotspot if wifi fails
    ssid: "Claude-Monitor Setup"

captive_portal:
api:
ota:
  - platform: esphome

# Time source (for the clock tile and the "clock time" reset format option)
time:
  - platform: sntp
    id: sntp_time
