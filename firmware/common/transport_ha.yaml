# ===================================================================
# Home Assistant transport (values published by the daemon over MQTT,
# pulled onto the device via the native API).
#
# Thin wrappers: each sensor converts HA's float to the shared scripts'
# int convention (-1 = unavailable) and delegates to common/ui.yaml.
# NAN = HA pushed "unavailable" (daemon's MQTT will fired, e.g. the
# computer went to sleep). Casting NAN to int is UB and paints garbage
# like "-214748%" — the NAN check lives here, where NAN originates.
# ===================================================================

sensor:
  - platform: homeassistant
    id: ha_session_pct
    entity_id: sensor.claude_monitor_claude_session_usage
    on_value:
      - script.execute:
          id: set_claude_session
          pct: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  - platform: homeassistant
    id: ha_week_pct
    entity_id: sensor.claude_monitor_claude_weekly_usage
    on_value:
      - script.execute:
          id: set_claude_week
          pct: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  - platform: homeassistant
    id: ha_fable_pct
    entity_id: sensor.claude_monitor_claude_fable_weekly_usage
    on_value:
      - script.execute:
          id: set_claude_fable
          pct: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  - platform: homeassistant
    id: ha_session_reset
    entity_id: sensor.claude_monitor_claude_session_reset
    on_value:
      - script.execute:
          id: set_claude_reset
          minutes: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  # The weekly reset covers BOTH weekly rings (week + fable share a resets_at).
  - platform: homeassistant
    id: ha_week_reset
    entity_id: sensor.claude_monitor_claude_weekly_reset
    on_value:
      - script.execute:
          id: set_claude_week_reset
          minutes: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  # --- Pace markers: % of the window elapsed (not used) ---
  - platform: homeassistant
    id: ha_session_elapsed
    entity_id: sensor.claude_monitor_claude_session_elapsed
    on_value:
      - script.execute:
          id: set_claude_session_elapsed
          pct: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  - platform: homeassistant
    id: ha_week_elapsed
    entity_id: sensor.claude_monitor_claude_weekly_elapsed
    on_value:
      - script.execute:
          id: set_claude_week_elapsed
          pct: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  # --- Codex sensors (published by the daemon: codex_state topic) ---
  # No session sensor: OpenAI retired the 5h window.
  - platform: homeassistant
    id: ha_codex_week_pct
    entity_id: sensor.claude_monitor_codex_weekly_usage
    on_value:
      - script.execute:
          id: set_codex_week
          pct: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  # Codex's reset is now the WEEKLY countdown (the session entity is gone).
  - platform: homeassistant
    id: ha_codex_week_reset
    entity_id: sensor.claude_monitor_codex_weekly_reset
    on_value:
      - script.execute:
          id: set_codex_reset
          minutes: !lambda 'return std::isnan(x) ? -1 : (int) x;'

  - platform: homeassistant
    id: ha_codex_week_elapsed
    entity_id: sensor.claude_monitor_codex_weekly_elapsed
    on_value:
      - script.execute:
          id: set_codex_week_elapsed
          pct: !lambda 'return std::isnan(x) ? -1 : (int) x;'
