# ===================================================================
# Shared UI: globals, update scripts, LVGL tileview, clock, auto-switch.
# Transport-agnostic — data arrives ONLY through the set_* scripts below,
# so HA (common/transport_ha.yaml) and BLE (common/transport_ble.yaml,
# 1.85B only) feed the same UI.
#
# Device files must define substitutions: tap_prev_max, tap_next_min
# (tap-nav x thresholds in px — resolution-dependent).
# ===================================================================

# Persist the reset-time display format across reboots (false = "2h39m", true = clock time)
globals:
  - id: reset_show_clock
    type: bool
    restore_value: true
    initial_value: 'false'
  # --- auto-switch state ---
  # Claude's 5h session is the ONLY activity signal left: it rises when you work
  # and falls back to 0 when you stop. OpenAI retired Codex's 5h window, and a
  # weekly % can't stand in for it — weekly never returns to 0, so it would pin
  # the device "active" all week and the idle->active edge would never fire again.
  # Codex therefore no longer participates in auto-switching.
  - id: claude_session_pct   # latest Claude 5h %
    type: int
    initial_value: '0'
  # --- pace-marker state ---
  # The marker is white on the dark unfilled track, black once the fill has
  # passed under it (white-on-bright-green/blue was unreadable). That needs BOTH
  # the usage % and the elapsed %, which arrive as separate HA sensors in either
  # order — so each side stores its value and re-runs the marker. -1 = unknown.
  - id: claude_week_pct
    type: int
    initial_value: '0'
  - id: claude_fable_pct
    type: int
    initial_value: '0'
  - id: codex_week_pct
    type: int
    initial_value: '0'
  - id: session_elapsed
    type: int
    initial_value: '-1'
  - id: week_elapsed
    type: int
    initial_value: '-1'
  - id: codex_elapsed
    type: int
    initial_value: '-1'
  - id: last_touch_ms        # millis() of last manual touch (pauses auto-switch)
    type: uint32_t
    initial_value: '0'
  - id: cur_tile             # last tile the auto-switch selected (column)
    type: int
    initial_value: '0'
  - id: switch_target        # auto-switch decision: -1 = none, else target column
    type: int
    initial_value: '-1'

# === Transport-facing update scripts ===
# Convention: percentages and minutes are ints; -1 = "unavailable" (the
# transport converts its raw input — HA float NAN, BLE sentinel bytes — to -1
# before calling). Each script owns the "--" rendering, the threshold colors
# (green <70 / amber 70-90 / red >90), and the auto-switch globals.
script:
  - id: set_claude_session
    parameters:
      pct: int
    then:
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lambda: 'id(claude_session_pct) = 0;'
            - lvgl.arc.update: { id: arc_session, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_claude_session, value: 0 }
            - lvgl.label.update: { id: lbl_pct, text: "--%" }
            - lvgl.label.update: { id: lbl_cmb_claude_pct, text: "--%" }
          else:
            - lambda: 'id(claude_session_pct) = pct;'
            - lvgl.arc.update: { id: arc_session, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_claude_session, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_claude_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            # color the inner arc green/amber/red by usage (both tiles)
            - lvgl.arc.update:
                id: arc_session
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);   // red
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);   // amber
                    return Color(0x2B, 0xE0, 0x6A);                  // bright green
            - lvgl.arc.update:
                id: arc_cmb_claude_session
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x2B, 0xE0, 0x6A);
      # Usage moved under the dot — recolor it.
      - script.execute: { id: refresh_markers }

  - id: set_claude_week
    parameters:
      pct: int
    then:
      - lambda: 'id(claude_week_pct) = (pct < 0) ? 0 : pct;'
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lvgl.arc.update: { id: arc_week, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_claude_week, value: 0 }
            - lvgl.label.update: { id: lbl_week, text: "week --%" }
            - lvgl.label.update: { id: lbl_cmb_claude_week, text: "wk --%" }
          else:
            - lvgl.arc.update: { id: arc_week, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_claude_week, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_week
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "week %d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_claude_week
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "wk %d%%", pct); return b;'
            - lvgl.arc.update:
                id: arc_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x00, 0xB0, 0xFF);                  // bright blue
            - lvgl.arc.update:
                id: arc_cmb_claude_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x00, 0xB0, 0xFF);
      - script.execute: { id: refresh_markers }

  # Fable = the model-scoped weekly window. Shares set_claude_week's reset
  # countdown (the API returns an identical resets_at for both weeklies), so
  # this script owns a percentage only — there is no set_fable_reset.
  - id: set_claude_fable
    parameters:
      pct: int
    then:
      - lambda: 'id(claude_fable_pct) = (pct < 0) ? 0 : pct;'
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lvgl.arc.update: { id: arc_fable, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_claude_fable, value: 0 }
            - lvgl.label.update: { id: lbl_fable, text: "fable --%" }
            - lvgl.label.update: { id: lbl_cmb_claude_fable, text: "fbl --%" }
          else:
            - lvgl.arc.update: { id: arc_fable, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_claude_fable, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_fable
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "fable %d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_claude_fable
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "fbl %d%%", pct); return b;'
            - lvgl.arc.update:
                id: arc_fable
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0xB0, 0x6A, 0xFF);                  // violet
            - lvgl.arc.update:
                id: arc_cmb_claude_fable
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0xB0, 0x6A, 0xFF);
      - script.execute: { id: refresh_markers }

  - id: set_claude_reset
    parameters:
      minutes: int
    then:
      - lvgl.label.update:
          id: lbl_reset
          text: !lambda |-
            static char b[24];
            if (minutes < 0) { snprintf(b, sizeof(b), "reset --"); return b; }
            int m = minutes;
            if (id(reset_show_clock)) {
              // show wall-clock time of reset = now + m minutes
              time_t t = ::time(nullptr) + (time_t)m * 60;
              struct tm *lt = localtime(&t);
              if (lt) { strftime(b, sizeof(b), "reset %H:%M", lt); }
              else { snprintf(b, sizeof(b), "reset %dh%02dm", m/60, m%60); }
            } else {
              snprintf(b, sizeof(b), "reset %dh%02dm", m/60, m%60);
            }
            return b;
      # Combined tile: same value, no "reset " prefix to save width.
      - lvgl.label.update:
          id: lbl_cmb_claude_reset
          text: !lambda |-
            static char b[16];
            if (minutes < 0) { snprintf(b, sizeof(b), "--"); return b; }
            int m = minutes;
            if (id(reset_show_clock)) {
              time_t t = ::time(nullptr) + (time_t)m * 60;
              struct tm *lt = localtime(&t);
              if (lt) { strftime(b, sizeof(b), "%H:%M", lt); }
              else { snprintf(b, sizeof(b), "%dh%02dm", m/60, m%60); }
            } else {
              snprintf(b, sizeof(b), "%dh%02dm", m/60, m%60);
            }
            return b;

  # OpenAI retired the 5h window, so Codex has no session script — week is its
  # only number and therefore its headline (lbl_codex_pct, the big one).
  - id: set_codex_week
    parameters:
      pct: int
    then:
      - lambda: 'id(codex_week_pct) = (pct < 0) ? 0 : pct;'
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lvgl.arc.update: { id: arc_codex_week, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_codex_week, value: 0 }
            - lvgl.label.update: { id: lbl_codex_pct, text: "--%" }
            - lvgl.label.update: { id: lbl_cmb_codex_pct, text: "--%" }
          else:
            - lvgl.arc.update: { id: arc_codex_week, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_codex_week, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_codex_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_codex_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            - lvgl.arc.update:
                id: arc_codex_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0xFF, 0xB0, 0x20);                  // amber-gold
            - lvgl.arc.update:
                id: arc_cmb_codex_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0xFF, 0xB0, 0x20);
      - script.execute: { id: refresh_markers }

  # NOTE: unlike Claude's, the Codex reset label intentionally ignores the
  # reset_show_clock toggle — countdown only (matches pre-refactor behavior).
  # Now a weekly countdown (days, not hours) since the 5h window is gone.
  # The weekly countdown covers BOTH weekly rings (week + fable share a
  # resets_at), which is why there is no separate Fable reset. Days, not hours:
  # a 7-day window would otherwise read "156h".
  - id: set_claude_week_reset
    parameters:
      minutes: int
    then:
      - lvgl.label.update:
          id: lbl_week_reset
          text: !lambda |-
            static char b[24];
            if (minutes < 0) { snprintf(b, sizeof(b), "wk reset --"); return b; }
            int m = minutes;
            if (id(reset_show_clock)) {
              time_t t = ::time(nullptr) + (time_t)m * 60;
              struct tm *lt = localtime(&t);
              // Weekly reset can be days out — a bare %H:%M would be ambiguous.
              if (lt) { strftime(b, sizeof(b), "wk %a %H:%M", lt); }
              else    { snprintf(b, sizeof(b), "wk %dd%02dh", m/1440, (m%1440)/60); }
            } else if (m >= 1440) {
              snprintf(b, sizeof(b), "wk reset %dd%02dh", m/1440, (m%1440)/60);
            } else {
              snprintf(b, sizeof(b), "wk reset %dh%02dm", m/60, m%60);
            }
            return b;
      # Combined tile: same value, terser (no "reset" word — space is tight).
      - lvgl.label.update:
          id: lbl_cmb_week_reset
          text: !lambda |-
            static char b[16];
            if (minutes < 0) { snprintf(b, sizeof(b), "wk --"); return b; }
            int m = minutes;
            if (id(reset_show_clock)) {
              time_t t = ::time(nullptr) + (time_t)m * 60;
              struct tm *lt = localtime(&t);
              if (lt) { strftime(b, sizeof(b), "wk %a %H:%M", lt); }
              else    { snprintf(b, sizeof(b), "wk %dd%02dh", m/1440, (m%1440)/60); }
            } else if (m >= 1440) {
              snprintf(b, sizeof(b), "wk %dd%02dh", m/1440, (m%1440)/60);
            } else {
              snprintf(b, sizeof(b), "wk %dh%02dm", m/60, m%60);
            }
            return b;

  - id: set_codex_reset
    parameters:
      minutes: int
    then:
      - lvgl.label.update:
          id: lbl_codex_reset
          text: !lambda |-
            static char b[24];
            if (minutes < 0) { snprintf(b, sizeof(b), "reset --"); return b; }
            int m = minutes;
            // Weekly window: hours alone would read "156h" — show days.
            if (m >= 1440) { snprintf(b, sizeof(b), "reset %dd%02dh", m/1440, (m%1440)/60); }
            else           { snprintf(b, sizeof(b), "reset %dh%02dm", m/60, m%60); }
            return b;
      # Combined tile: countdown only, no "reset " prefix.
      - lvgl.label.update:
          id: lbl_cmb_codex_reset
          text: !lambda |-
            static char b[16];
            if (minutes < 0) { snprintf(b, sizeof(b), "--"); return b; }
            int m = minutes;
            if (m >= 1440) { snprintf(b, sizeof(b), "%dd%02dh", m/1440, (m%1440)/60); }
            else           { snprintf(b, sizeof(b), "%dh%02dm", m/60, m%60); }
            return b;

  # Transport-facing pace-marker entry points (same int/-1 convention).
  # Each stores its elapsed % and redraws; refresh_markers() below re-runs them
  # when the USAGE side changes, since the dot's color depends on both.
  - id: set_claude_session_elapsed
    parameters:
      pct: int
    then:
      - lambda: 'id(session_elapsed) = pct;'
      - script.execute: { id: refresh_markers }

  - id: set_claude_week_elapsed
    parameters:
      pct: int
    then:
      - lambda: 'id(week_elapsed) = pct;'
      - script.execute: { id: refresh_markers }

  - id: set_codex_week_elapsed
    parameters:
      pct: int
    then:
      - lambda: 'id(codex_elapsed) = pct;'
      - script.execute: { id: refresh_markers }

  # Redraw every marker from the stored globals. Cheap (7 obj repositions) and
  # called whenever EITHER input changes, so order of arrival doesn't matter.
  # mode: parallel — refresh_markers fires place_marker 7x back-to-back, and
  # both can be re-entered as sensors land. The default (single) would silently
  # DROP those calls, leaving markers stale. Safe here: both scripts are pure
  # synchronous lambdas with no delays, so there is nothing to interleave.
  - id: refresh_markers
    mode: parallel
    then:
      - script.execute:
          id: place_marker
          marker_id: 0
          pct: !lambda 'return id(session_elapsed);'
          used: !lambda 'return id(claude_session_pct);'
      - script.execute:
          id: place_marker
          marker_id: 2
          pct: !lambda 'return id(session_elapsed);'
          used: !lambda 'return id(claude_session_pct);'
      - script.execute:
          id: place_marker
          marker_id: 1
          pct: !lambda 'return id(week_elapsed);'
          used: !lambda 'return id(claude_week_pct);'
      - script.execute:
          id: place_marker
          marker_id: 3
          pct: !lambda 'return id(week_elapsed);'
          used: !lambda 'return id(claude_week_pct);'
      - script.execute:
          id: place_marker
          marker_id: 4
          pct: !lambda 'return id(codex_elapsed);'
          used: !lambda 'return id(codex_week_pct);'
      # Fable: same elapsed % as the weekly (shared resets_at), own usage %.
      - script.execute:
          id: place_marker
          marker_id: 5
          pct: !lambda 'return id(week_elapsed);'
          used: !lambda 'return id(claude_fable_pct);'
      - script.execute:
          id: place_marker
          marker_id: 6
          pct: !lambda 'return id(week_elapsed);'
          used: !lambda 'return id(claude_fable_pct);'

  # === Pace markers ===
  # A small dot on the ring showing how far THROUGH the window we are, so the
  # gap between it and the fill reads as ahead/behind pace at a glance.
  # LVGL has no native arc marker, so it's an obj positioned by trigonometry.
  #
  # Angles here must match each arc's span (see the tile comments):
  #   Claude tiles: full circle, 0..360 starting at 12 o'clock  -> -90 + p*3.6
  #   Combined top: 184..356                                    -> 184 + p*1.72
  #   Combined bot: 4..176 REVERSE, fills from 176 backwards    -> 176 - p*1.72
  # Radius = (arc diameter - arc_width) / 2, so the dot rides the ring's centre.
  - id: place_marker
    mode: parallel        # see refresh_markers — called 7x in a row
    parameters:
      marker_id: int      # 0=session 1=week 2=cmb session 3=cmb week
                          # 4=cmb codex 5=fable 6=cmb fable
      pct: int            # elapsed % — where the dot goes
      used: int           # usage % — what's under the dot (decides its color)
    then:
      - lambda: |-
          // Hide the marker when there is no pace data (pct < 0).
          auto hide = [](lv_obj_t *o) { lv_obj_add_flag(o, LV_OBJ_FLAG_HIDDEN); };
          auto show = [](lv_obj_t *o) { lv_obj_clear_flag(o, LV_OBJ_FLAG_HIDDEN); };
          // A plain `obj:` widget's id IS an lv_obj_t* (ObjType registers
          // lv_obj_t); only compound widgets like meter/dropdown need ->obj.
          lv_obj_t *obj = nullptr;
          float deg = 0, radius = 0;
          switch (marker_id) {
            case 0: obj = id(mk_session);     radius = (376-20)/2.0f; deg = -90 + pct*3.6f;  break;
            case 1: obj = id(mk_week);        radius = (472-20)/2.0f; deg = -90 + pct*3.6f;  break;
            case 2: obj = id(mk_cmb_session); radius = (384-14)/2.0f; deg = 184 + pct*1.72f; break;
            case 3: obj = id(mk_cmb_week);    radius = (472-14)/2.0f; deg = 184 + pct*1.72f; break;
            case 4: obj = id(mk_cmb_codex);   radius = (472-14)/2.0f; deg = 176 - pct*1.72f; break;
            // Fable shares the weekly's resets_at, so it shares the weekly's
            // ANGLE — only the radius differs. Its colour still needs its own
            // usage %, since Fable and all-models fill at different rates.
            case 5: obj = id(mk_fable);       radius = (424-20)/2.0f; deg = -90 + pct*3.6f;  break;
            case 6: obj = id(mk_cmb_fable);   radius = (428-14)/2.0f; deg = 184 + pct*1.72f; break;
            default: return;
          }
          if (pct < 0) { hide(obj); return; }
          show(obj);

          // Contrast: the dot sits ON the ring, so its background is the fill
          // when used >= pct (behind pace) and the dark track otherwise.
          // White on bright green/blue is unreadable — go black there.
          bool on_fill = (used >= 0 && used >= pct);
          lv_obj_set_style_bg_color(obj,
              on_fill ? lv_color_hex(0x000000) : lv_color_hex(0xFFFFFF),
              LV_PART_MAIN);

          float rad = deg * 3.14159265f / 180.0f;
          // lv_obj_align() offsets from the PARENT's centre, so this stays
          // correct regardless of where the tile sits inside the tileview.
          // (lv_obj_set_pos would be parent-relative from the top-left, which
          // works on tile 0 but is fragile to relayout.) The dot's own size is
          // handled by ALIGN_CENTER, so no -4 half-width fudge is needed.
          lv_obj_align(obj, LV_ALIGN_CENTER,
                       (lv_coord_t)lroundf(radius * cosf(rad)),
                       (lv_coord_t)lroundf(radius * sinf(rad)));

  # Touch handler, called by the board's touchscreen on_touch.
  # Tap navigation: tap the left third = previous tile, right third = next.
  # Center third is left for buttons/sliders.
  - id: ui_on_touch
    parameters:
      x: int
      y: int
    then:
      - lambda: 'id(last_touch_ms) = millis();'   # pause auto-switch after manual touch
      - logger.log:
          format: "TOUCH x=%d y=%d"
          args: [x, y]
      - lambda: |-
          int dir = 0;
          if (x < ${tap_prev_max})       dir = -1;   // left edge -> previous
          else if (x > ${tap_next_min})  dir = +1;   // right edge -> next (Settings buttons are centered)
          if (dir != 0) {
            int t = id(cur_tile) + dir;
            if (t < 0) t = 0;
            if (t > 4) t = 4;            // tiles: 0=Combined 1=Claude 2=Codex 3=Clock 4=Settings
            id(switch_target) = t;
          } else {
            id(switch_target) = -1;
          }
      - if:
          condition:
            lambda: 'return id(switch_target) >= 0 && id(switch_target) != id(cur_tile);'
          then:
            - lvgl.tileview.select:
                id: tiles
                row: 0
                column: !lambda 'return id(switch_target);'
                animated: true
            - lambda: 'id(cur_tile) = id(switch_target);'

# Drive the Explorer clock hands once per second (smooth second hand).
interval:
  - interval: 1s
    then:
      # NOTE: runtime angle lambdas return 0.1-degree units (degrees * 10).
      - lvgl.image.update:
          id: clk_hour
          rotation: !lambda 'auto t = id(sntp_time).now(); if (!t.is_valid()) return 0.0f; return ((t.hour % 12) * 60 + t.minute) * 5.0f;'   # 3600/720
      - lvgl.image.update:
          id: clk_minute
          rotation: !lambda 'auto t = id(sntp_time).now(); if (!t.is_valid()) return 0.0f; return (t.minute * 60 + t.second) * 1.0f;'        # 3600/3600
      - lvgl.image.update:
          id: clk_second
          rotation: !lambda 'auto t = id(sntp_time).now(); if (!t.is_valid()) return 0.0f; return t.second * 60.0f;'                         # 3600/60

  # Auto-switch tiles: Combined is home. When the Claude 5h session goes active
  # (0 -> >0), rest on the Combined tile (col 0) which shows both providers at
  # once. When it goes idle (including "daemon offline" — HA pushes unavailable
  # -> NAN -> the sensor handler zeroes the global), drop to the Clock (col 3).
  # Edge-triggered on the idle<->active transition so it never fights a manual
  # swipe mid-session. Paused 2 min after any manual touch.
  # Claude-only since OpenAI retired Codex's 5h window — see the globals note.
  - interval: 2s
    then:
      # If HA itself is unreachable there is no live data — treat as idle.
      - if:
          condition:
            not:
              api.connected:
          then:
            - lambda: 'id(claude_session_pct) = 0;'
      # Decide the target tile (writes id(switch_target): -1 = no change, else column)
      - lambda: |-
          static bool prev_active = false;   // was the session active last tick?
          bool active = (id(claude_session_pct) > 0);
          // last_touch_ms == 0 means "never touched" — without that check the
          // device boots paused and eats the first idle->active transition.
          bool paused = id(last_touch_ms) != 0 &&
                        (millis() - id(last_touch_ms)) < 120000;  // 2 min after touch

          int target = -1;  // -1 = leave as-is
          if (!paused) {
            if (active && !prev_active)       target = 0;  // became active -> Combined home
            else if (!active && prev_active)  target = 3;  // both idle -> Clock
            // Consume prev only when we actually evaluated it; updating it while
            // paused silently discards transitions that happen during the pause.
            prev_active = active;
          }

          if (target >= 0 && target == id(cur_tile)) target = -1;  // already there
          id(switch_target) = target;
      - if:
          condition:
            lambda: 'return id(switch_target) >= 0;'
          then:
            - lvgl.tileview.select:
                id: tiles
                row: 0
                column: !lambda 'return id(switch_target);'
                animated: true
            - lambda: 'id(cur_tile) = id(switch_target);'

font:
  - file: "gfonts://Roboto@700"
    id: font_pct          # big center percentage
    size: 88
  - file: "gfonts://Roboto@700"
    id: font_pct_sm       # combined-tile session % (two per screen, must fit a half)
    size: 50
  - file: "gfonts://Roboto"
    id: font_tiny         # combined-tile reset line (least-glanced, smallest slot)
    size: 18
  - file: "gfonts://Roboto@500"
    id: font_med          # labels
    size: 30
  - file: "gfonts://Roboto"
    id: font_small        # reset countdown
    size: 24
  - file: "gfonts://Montserrat@600"
    id: font_num          # Explorer 3-6-9 numerals (rounded geometric, like the dial)
    size: 72
  - file: "gfonts://Roboto@500"
    id: font_brand        # dial text (ROLEX-style block)
    size: 16

# === Clock hand images (Explorer-style), rotated by the clock interval ===
# Images are platforms of the `image` component as of ESPHome 2026.x; the bare
# `- file:` form is removed in 2027.1.0.
image:
  - platform: file
    file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/hand_hour.png"
    id: img_hour
    type: RGB
    transparency: alpha_channel
  - platform: file
    file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/hand_minute.png"
    id: img_minute
    type: RGB
    transparency: alpha_channel
  - platform: file
    file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/hand_second.png"
    id: img_second
    type: RGB
    transparency: alpha_channel
  - platform: file
    file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/marker_triangle.png"
    id: img_triangle
    type: RGB
    transparency: alpha_channel
  - platform: file
    file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/baton.png"
    id: img_baton
    type: RGB
    transparency: alpha_channel

# === LVGL UI: two concentric arcs + center readout ===
lvgl:
  displays:
    - lcd
  # The bottom layer is painted behind every page — make it black.
  bottom_layer:
    bg_color: 0x000000
    bg_opa: COVER
  # Swipe left/right between tiles: Claude → Codex → Settings
  widgets:
    - tileview:
        id: tiles
        bg_color: 0x000000
        bg_opa: COVER
        # Keep cur_tile honest: finger swipes change tiles without going through
        # tap-nav or the auto-switch, which otherwise navigate from a stale index.
        on_value:
          then:
            - lambda: |-
                if      (tile == id(tile_combined)) id(cur_tile) = 0;
                else if (tile == id(tile_claude))   id(cur_tile) = 1;
                else if (tile == id(tile_codex))    id(cur_tile) = 2;
                else if (tile == id(tile_clock))    id(cur_tile) = 3;
                else if (tile == id(tile_settings)) id(cur_tile) = 4;
        tiles:
          # ---------- Tile 0: Combined (Claude top, Codex bottom) ----------
          # Claude has three windows now and Codex one, so the old left/right
          # mirror is gone. Instead EVERY arc fills from 9 o'clock, giving the
          # four rings a common zero — lengths compare directly by eye, like
          # bars sharing a baseline.
          #
          # LVGL angles: 0 = 3 o'clock, increasing CLOCKWISE (90 = 6 o'clock,
          # 180 = 9, 270 = 12).
          #   Claude (top):    184 -> 356, through 270. Fills from 9 naturally.
          #   Codex  (bottom):   4 -> 176, through 90, mode: REVERSE so it fills
          #                      from the 176 (9 o'clock) end rather than from 4.
          # Both inset 4 deg from the 9/3 seams so the groups never touch.
          # Claude's three rings nest inward (week outer, fable, session);
          # Codex's single ring sits at the outer radius.
          - id: tile_combined
            row: 0
            column: 0
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              # ---- Claude (top): three nested rings, all anchored at 9 o'clock ----
              - arc:
                  id: arc_cmb_claude_week
                  align: CENTER
                  width: 472
                  height: 472
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 184
                  end_angle: 356
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 14
                  arc_color: 0x203A5C
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 14
                    arc_color: 0x18B4FF
              - arc:
                  id: arc_cmb_claude_fable
                  align: CENTER
                  width: 428
                  height: 428
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 184
                  end_angle: 356
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 14
                  arc_color: 0x3A2A5C
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 14
                    arc_color: 0xB06AFF
              - arc:
                  id: arc_cmb_claude_session
                  align: CENTER
                  width: 384
                  height: 384
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 184
                  end_angle: 356
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 14
                  arc_color: 0x1E5235
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 14
                    arc_color: 0x2BE06A
              # Claude readout, top-down: session % (headline) with ITS countdown
              # directly under it, then the two weeklies side by side in their
              # ring colors. lbl_cmb_claude_reset is the SESSION countdown — it
              # sits above the weekly pair so it can't be misread as theirs. The
              # weekly reset lives on the Claude tile only; there is no room for
              # a fifth line here and the session clock is the urgent one.
              - label:
                  id: lbl_cmb_claude_pct
                  align: CENTER
                  y: -134
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct_sm
              - label:
                  id: lbl_cmb_claude_reset
                  align: CENTER
                  y: -96
                  text: "--"
                  text_color: 0x999999
                  text_font: font_tiny
              - label:
                  align: CENTER
                  y: -72
                  text: "Claude"
                  text_color: 0xBBBBBB
                  text_font: font_small
              - label:
                  id: lbl_cmb_claude_week
                  align: CENTER
                  x: -46
                  y: -44
                  text: "wk --%"
                  text_color: 0x00B0FF
                  text_font: font_small
              - label:
                  id: lbl_cmb_claude_fable
                  align: CENTER
                  x: 46
                  y: -44
                  text: "fbl --%"
                  text_color: 0xB06AFF
                  text_font: font_small
              # Weekly countdown — covers BOTH weekly rings (shared resets_at).
              - label:
                  id: lbl_cmb_week_reset
                  align: CENTER
                  y: -20
                  text: "wk --"
                  text_color: 0x777777
                  text_font: font_tiny
              # ---- Codex (bottom): one ring, same 9 o'clock anchor ----
              # Angles are LVGL's: 0 = 3 o'clock, increasing CLOCKWISE (hence
              # 90 = 6 o'clock, 270 = 12). So the lower half is 4 -> 176, which
              # sweeps through 90. That span's natural fill starts at 4 (the 3
              # o'clock end) — mode: REVERSE flips it to fill from 176 instead,
              # putting Codex's zero at 9 o'clock like Claude's rings.
              - arc:
                  id: arc_cmb_codex_week
                  align: CENTER
                  width: 472
                  height: 472
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 4
                  end_angle: 176
                  mode: REVERSE
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 14
                  arc_color: 0x3A2A14
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 14
                    arc_color: 0xFFB020
              # Codex readout: week % IS the headline now — no session to outrank it.
              - label:
                  id: lbl_cmb_codex_pct
                  align: CENTER
                  y: 84
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct_sm
              - label:
                  align: CENTER
                  y: 124
                  text: "Codex week"
                  text_color: 0xBBBBBB
                  text_font: font_small
              - label:
                  id: lbl_cmb_codex_reset
                  align: CENTER
                  y: 152
                  text: "--"
                  text_color: 0x999999
                  text_font: font_tiny
              # Pace markers, LAST so they paint over the arcs. Positioned at
              # runtime by place_marker; hidden until data arrives. align is
              # omitted deliberately — lv_obj_set_pos() sets absolute x/y.
              - obj:
                  id: mk_cmb_week
                  width: 8
                  height: 8
                  radius: 4
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
                  hidden: true
              - obj:
                  id: mk_cmb_fable
                  width: 8
                  height: 8
                  radius: 4
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
                  hidden: true
              - obj:
                  id: mk_cmb_session
                  width: 8
                  height: 8
                  radius: 4
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
                  hidden: true
              - obj:
                  id: mk_cmb_codex
                  width: 8
                  height: 8
                  radius: 4
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
                  hidden: true
          # ---------- Tile 1: Claude ----------
          # Three rings (outer→inner): weekly (blue), fable (violet), session (green)
          - id: tile_claude
            row: 0
            column: 1
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              - arc:
                  id: arc_week
                  align: CENTER
                  width: 472
                  height: 472
                  min_value: 0
                  max_value: 100
                  value: 4
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  bg_color: 0x000000
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 20
                  arc_color: 0x203A5C
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 20
                    arc_color: 0x18B4FF
              - arc:
                  id: arc_fable
                  align: CENTER
                  width: 424
                  height: 424
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  bg_color: 0x000000
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 20
                  arc_color: 0x3A2A5C
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 20
                    arc_color: 0xB06AFF
              - arc:
                  id: arc_session
                  align: CENTER
                  width: 376
                  height: 376
                  min_value: 0
                  max_value: 100
                  value: 2
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  bg_color: 0x000000
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 20
                  arc_color: 0x1E5235
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 20
                    arc_color: 0x2BE06A
              - label:
                  id: lbl_pct
                  align: CENTER
                  y: -56
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct
              - label:
                  align: CENTER
                  y: 8
                  text: "Claude Code"
                  text_color: 0xBBBBBB
                  text_font: font_med
              - label:
                  id: lbl_week
                  align: CENTER
                  y: 42
                  text: "week --%"
                  text_color: 0x00B0FF
                  text_font: font_small
              - label:
                  id: lbl_fable
                  align: CENTER
                  y: 72
                  text: "fable --%"
                  text_color: 0xB06AFF
                  text_font: font_small
              - label:
                  id: lbl_reset
                  align: CENTER
                  y: 102
                  text: "reset --"
                  text_color: 0x999999
                  text_font: font_small
              - label:
                  id: lbl_week_reset
                  align: CENTER
                  y: 130
                  text: "wk reset --"
                  text_color: 0x777777
                  text_font: font_tiny
              # Pace markers, last so they paint over the arcs.
              - obj:
                  id: mk_week
                  width: 8
                  height: 8
                  radius: 4
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
                  hidden: true
              - obj:
                  id: mk_fable
                  width: 8
                  height: 8
                  radius: 4
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
                  hidden: true
              - obj:
                  id: mk_session
                  width: 8
                  height: 8
                  radius: 4
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
                  hidden: true
          # ---------- Tile 2: Codex ----------
          # One ring: weekly (gold). OpenAI retired the 5h window, so the weekly
          # number is the headline rather than a subtitle under a session %.
          - id: tile_codex
            row: 0
            column: 2
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              - arc:
                  id: arc_codex_week
                  align: CENTER
                  width: 470
                  height: 470
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 26
                  arc_color: 0x3A2A14
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 26
                    arc_color: 0xFFB020
              - label:
                  id: lbl_codex_pct
                  align: CENTER
                  y: -34
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct
              - label:
                  align: CENTER
                  y: 38
                  text: "Codex week"
                  text_color: 0xBBBBBB
                  text_font: font_med
              - label:
                  id: lbl_codex_reset
                  align: CENTER
                  y: 80
                  text: "reset --"
                  text_color: 0x999999
                  text_font: font_small
          # ---------- Tile 2: Clock (Rolex Explorer I homage) ----------
          - id: tile_clock
            row: 0
            column: 3
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              # The dial + hands via a meter widget.
              - meter:
                  id: clock_meter
                  align: CENTER
                  width: 480
                  height: 480
                  bg_opa: TRANSP
                  border_width: 0
                  text_color: 0xFFFFFF
                  scales:
                    # fine minute ticks around the rim
                    - range_from: 0
                      range_to: 60
                      angle_range: 360
                      rotation: 270
                      ticks:
                        count: 60
                        length: 12
                        width: 2
                        color: 0xAAAAAA
              # Triangle marker at 12 (Explorer signature)
              - image:
                  src: img_triangle
                  align: CENTER
                  y: -198
              # Baton hour markers at 1,2,4,5,7,8,10,11 (skip 3/6/9 numerals + 12 triangle).
              # baton.png 24x210, pivot (12,210); y:-105 puts pivot at dial center; rotate by hour angle.
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 30 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 60 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 120 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 150 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 210 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 240 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 300 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, rotation: 330 }
              # 3 / 6 / 9 Arabic numerals
              - label:
                  align: CENTER
                  x: 172
                  y: 0
                  text: "3"
                  text_color: 0xFFFFFF
                  text_font: font_num
              - label:
                  align: CENTER
                  x: 0
                  y: 168
                  text: "6"
                  text_color: 0xFFFFFF
                  text_font: font_num
              - label:
                  align: CENTER
                  x: -172
                  y: 0
                  text: "9"
                  text_color: 0xFFFFFF
                  text_font: font_num
              # Crown/brand text block (upper dial, clear of the hands)
              - label:
                  align: CENTER
                  y: -108
                  text: "ROLEX"
                  text_color: 0xFFFFFF
                  text_font: font_brand
              - label:
                  align: CENTER
                  y: -86
                  text: "OYSTER PERPETUAL"
                  text_color: 0xBBBBBB
                  text_font: font_brand
              # EXPLORER text (lower dial, above 6 — kept clear of the hands)
              - label:
                  align: CENTER
                  y: 84
                  text: "EXPLORER"
                  text_color: 0xDDDDDD
                  text_font: font_brand
              # --- Hands (rotating images, on top of dial text). pivot = the
              #     hand's base pixel; y offset puts that pivot at the dial center. ---
              - image:
                  id: clk_hour
                  src: img_hour
                  align: CENTER
                  y: -75            # 150/2 → base pixel lands at center
                  pivot_x: 30
                  pivot_y: 150
              - image:
                  id: clk_minute
                  src: img_minute
                  align: CENTER
                  y: -105           # 210/2
                  pivot_x: 20
                  pivot_y: 210
              - image:
                  id: clk_second
                  src: img_second
                  align: CENTER
                  y: -55            # pivot 170, image 230 → (230/2 - 170) = -55 offset
                  pivot_x: 12
                  pivot_y: 170
              # center cap (over the hands)
              - obj:
                  align: CENTER
                  width: 20
                  height: 20
                  radius: 10
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
          # ---------- Tile 3: Settings ----------
          - id: tile_settings
            row: 0
            column: 4
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              - label:
                  align: TOP_MID
                  y: 70
                  text: "Settings"
                  text_color: 0xFFFFFF
                  text_font: font_med
              # Brightness label + slider
              - label:
                  id: lbl_bright
                  align: CENTER
                  y: -70
                  text: "Brightness 100%"
                  text_color: 0xBBBBBB
                  text_font: font_small
              - slider:
                  id: sld_bright
                  align: CENTER
                  y: -30
                  width: 280
                  height: 18
                  min_value: 10
                  max_value: 100
                  value: 100
                  on_value:
                    - light.turn_on:
                        id: backlight
                        brightness: !lambda 'return x / 100.0;'
                    - lvgl.label.update:
                        id: lbl_bright
                        text: !lambda 'static char b[20]; snprintf(b, sizeof(b), "Brightness %d%%", (int)x); return b;'
              # Reset-time format toggle
              - button:
                  id: btn_reset_fmt
                  align: CENTER
                  y: 36
                  width: 240
                  height: 46
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_reset_fmt
                        align: CENTER
                        text: "Reset: Countdown"
                        text_font: font_small
                  on_click:
                    - lambda: 'id(reset_show_clock) = !id(reset_show_clock);'
                    - lvgl.label.update:
                        id: lbl_reset_fmt
                        text: !lambda 'return id(reset_show_clock) ? std::string("Reset: Clock") : std::string("Reset: Countdown");'
