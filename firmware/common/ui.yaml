# ===================================================================
# Shared UI: globals, update scripts, LVGL tileview, clock, auto-switch.
# Transport-agnostic — data arrives ONLY through the set_* scripts below,
# so HA (common/transport_ha.yaml) and BLE (common/transport_ble.yaml,
# 1.85B only) feed the same UI.
#
# Device files must define substitutions: tap_prev_max, tap_next_min
# (tap-nav x thresholds in px — resolution-dependent).
# ===================================================================

# Persist the reset-time display format across reboots (false = "2h39m", true = clock time)
globals:
  - id: reset_show_clock
    type: bool
    restore_value: true
    initial_value: 'false'
  # --- auto-switch state ---
  - id: claude_session_pct   # latest Claude 5h %
    type: int
    initial_value: '0'
  - id: codex_session_pct    # latest Codex 5h %
    type: int
    initial_value: '0'
  - id: last_touch_ms        # millis() of last manual touch (pauses auto-switch)
    type: uint32_t
    initial_value: '0'
  - id: cur_tile             # last tile the auto-switch selected (column)
    type: int
    initial_value: '0'
  - id: switch_target        # auto-switch decision: -1 = none, else target column
    type: int
    initial_value: '-1'

# === Transport-facing update scripts ===
# Convention: percentages and minutes are ints; -1 = "unavailable" (the
# transport converts its raw input — HA float NAN, BLE sentinel bytes — to -1
# before calling). Each script owns the "--" rendering, the threshold colors
# (green <70 / amber 70-90 / red >90), and the auto-switch globals.
script:
  - id: set_claude_session
    parameters:
      pct: int
    then:
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lambda: 'id(claude_session_pct) = 0;'
            - lvgl.arc.update: { id: arc_session, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_claude_session, value: 0 }
            - lvgl.label.update: { id: lbl_pct, text: "--%" }
            - lvgl.label.update: { id: lbl_cmb_claude_pct, text: "--%" }
          else:
            - lambda: 'id(claude_session_pct) = pct;'
            - lvgl.arc.update: { id: arc_session, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_claude_session, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_claude_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            # color the inner arc green/amber/red by usage (both tiles)
            - lvgl.arc.update:
                id: arc_session
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);   // red
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);   // amber
                    return Color(0x2B, 0xE0, 0x6A);                  // bright green
            - lvgl.arc.update:
                id: arc_cmb_claude_session
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x2B, 0xE0, 0x6A);

  - id: set_claude_week
    parameters:
      pct: int
    then:
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lvgl.arc.update: { id: arc_week, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_claude_week, value: 0 }
            - lvgl.label.update: { id: lbl_week, text: "week --%" }
            - lvgl.label.update: { id: lbl_cmb_claude_week, text: "wk --%" }
          else:
            - lvgl.arc.update: { id: arc_week, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_claude_week, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_week
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "week %d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_claude_week
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "wk %d%%", pct); return b;'
            - lvgl.arc.update:
                id: arc_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x00, 0xB0, 0xFF);                  // bright blue
            - lvgl.arc.update:
                id: arc_cmb_claude_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x00, 0xB0, 0xFF);

  - id: set_claude_reset
    parameters:
      minutes: int
    then:
      - lvgl.label.update:
          id: lbl_reset
          text: !lambda |-
            static char b[24];
            if (minutes < 0) { snprintf(b, sizeof(b), "reset --"); return b; }
            int m = minutes;
            if (id(reset_show_clock)) {
              // show wall-clock time of reset = now + m minutes
              time_t t = ::time(nullptr) + (time_t)m * 60;
              struct tm *lt = localtime(&t);
              if (lt) { strftime(b, sizeof(b), "reset %H:%M", lt); }
              else { snprintf(b, sizeof(b), "reset %dh%02dm", m/60, m%60); }
            } else {
              snprintf(b, sizeof(b), "reset %dh%02dm", m/60, m%60);
            }
            return b;
      # Combined tile: same value, no "reset " prefix to save width.
      - lvgl.label.update:
          id: lbl_cmb_claude_reset
          text: !lambda |-
            static char b[16];
            if (minutes < 0) { snprintf(b, sizeof(b), "--"); return b; }
            int m = minutes;
            if (id(reset_show_clock)) {
              time_t t = ::time(nullptr) + (time_t)m * 60;
              struct tm *lt = localtime(&t);
              if (lt) { strftime(b, sizeof(b), "%H:%M", lt); }
              else { snprintf(b, sizeof(b), "%dh%02dm", m/60, m%60); }
            } else {
              snprintf(b, sizeof(b), "%dh%02dm", m/60, m%60);
            }
            return b;

  - id: set_codex_session
    parameters:
      pct: int
    then:
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lambda: 'id(codex_session_pct) = 0;'
            - lvgl.arc.update: { id: arc_codex_session, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_codex_session, value: 0 }
            - lvgl.label.update: { id: lbl_codex_pct, text: "--%" }
            - lvgl.label.update: { id: lbl_cmb_codex_pct, text: "--%" }
          else:
            - lambda: 'id(codex_session_pct) = pct;'
            - lvgl.arc.update: { id: arc_codex_session, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_codex_session, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_codex_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_codex_pct
                text: !lambda 'static char b[8]; snprintf(b, sizeof(b), "%d%%", pct); return b;'
            - lvgl.arc.update:
                id: arc_codex_session
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x20, 0xD0, 0xD0);                  // teal
            - lvgl.arc.update:
                id: arc_cmb_codex_session
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0x20, 0xD0, 0xD0);

  - id: set_codex_week
    parameters:
      pct: int
    then:
      - if:
          condition:
            lambda: 'return pct < 0;'
          then:
            - lvgl.arc.update: { id: arc_codex_week, value: 0 }
            - lvgl.arc.update: { id: arc_cmb_codex_week, value: 0 }
            - lvgl.label.update: { id: lbl_codex_week, text: "week --%" }
            - lvgl.label.update: { id: lbl_cmb_codex_week, text: "wk --%" }
          else:
            - lvgl.arc.update: { id: arc_codex_week, value: !lambda 'return pct;' }
            - lvgl.arc.update: { id: arc_cmb_codex_week, value: !lambda 'return pct;' }
            - lvgl.label.update:
                id: lbl_codex_week
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "week %d%%", pct); return b;'
            - lvgl.label.update:
                id: lbl_cmb_codex_week
                text: !lambda 'static char b[16]; snprintf(b, sizeof(b), "wk %d%%", pct); return b;'
            - lvgl.arc.update:
                id: arc_codex_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0xFF, 0xB0, 0x20);                  // amber-gold
            - lvgl.arc.update:
                id: arc_cmb_codex_week
                indicator:
                  arc_color: !lambda |-
                    if (pct >= 90) return Color(0xFF, 0x3B, 0x30);
                    if (pct >= 70) return Color(0xFF, 0xB0, 0x00);
                    return Color(0xFF, 0xB0, 0x20);

  # NOTE: unlike Claude's, the Codex reset label intentionally ignores the
  # reset_show_clock toggle — countdown only (matches pre-refactor behavior).
  - id: set_codex_reset
    parameters:
      minutes: int
    then:
      - lvgl.label.update:
          id: lbl_codex_reset
          text: !lambda |-
            static char b[24];
            if (minutes < 0) { snprintf(b, sizeof(b), "reset --"); return b; }
            int m = minutes;
            snprintf(b, sizeof(b), "reset %dh%02dm", m/60, m%60);
            return b;
      # Combined tile: countdown only, no "reset " prefix.
      - lvgl.label.update:
          id: lbl_cmb_codex_reset
          text: !lambda |-
            static char b[16];
            if (minutes < 0) { snprintf(b, sizeof(b), "--"); return b; }
            int m = minutes;
            snprintf(b, sizeof(b), "%dh%02dm", m/60, m%60);
            return b;

  # Touch handler, called by the board's touchscreen on_touch.
  # Tap navigation: tap the left third = previous tile, right third = next.
  # Center third is left for buttons/sliders.
  - id: ui_on_touch
    parameters:
      x: int
      y: int
    then:
      - lambda: 'id(last_touch_ms) = millis();'   # pause auto-switch after manual touch
      - logger.log:
          format: "TOUCH x=%d y=%d"
          args: [x, y]
      - lambda: |-
          int dir = 0;
          if (x < ${tap_prev_max})       dir = -1;   // left edge -> previous
          else if (x > ${tap_next_min})  dir = +1;   // right edge -> next (Settings buttons are centered)
          if (dir != 0) {
            int t = id(cur_tile) + dir;
            if (t < 0) t = 0;
            if (t > 4) t = 4;            // tiles: 0=Combined 1=Claude 2=Codex 3=Clock 4=Settings
            id(switch_target) = t;
          } else {
            id(switch_target) = -1;
          }
      - if:
          condition:
            lambda: 'return id(switch_target) >= 0 && id(switch_target) != id(cur_tile);'
          then:
            - lvgl.tileview.select:
                id: tiles
                row: 0
                column: !lambda 'return id(switch_target);'
                animated: true
            - lambda: 'id(cur_tile) = id(switch_target);'

# Drive the Explorer clock hands once per second (smooth second hand).
interval:
  - interval: 1s
    then:
      # NOTE: runtime angle lambdas return 0.1-degree units (degrees * 10).
      - lvgl.image.update:
          id: clk_hour
          angle: !lambda 'auto t = id(sntp_time).now(); if (!t.is_valid()) return 0.0f; return ((t.hour % 12) * 60 + t.minute) * 5.0f;'   # 3600/720
      - lvgl.image.update:
          id: clk_minute
          angle: !lambda 'auto t = id(sntp_time).now(); if (!t.is_valid()) return 0.0f; return (t.minute * 60 + t.second) * 1.0f;'        # 3600/3600
      - lvgl.image.update:
          id: clk_second
          angle: !lambda 'auto t = id(sntp_time).now(); if (!t.is_valid()) return 0.0f; return t.second * 60.0f;'                         # 3600/60

  # Auto-switch tiles: Combined is home. When either 5h session goes active
  # (0 -> >0), rest on the Combined tile (col 0) which shows both providers at
  # once. When BOTH sessions become idle (including "daemon offline" — HA pushes
  # unavailable -> NAN -> the sensor handlers zero the globals), drop to the
  # Clock (col 3). Edge-triggered on the idle<->active transition so it never
  # fights a manual swipe mid-session. Paused 2 min after any manual touch.
  - interval: 2s
    then:
      # If HA itself is unreachable there is no live data — treat as idle.
      - if:
          condition:
            not:
              api.connected:
          then:
            - lambda: 'id(claude_session_pct) = 0; id(codex_session_pct) = 0;'
      # Decide the target tile (writes id(switch_target): -1 = no change, else column)
      - lambda: |-
          static bool prev_active = false;   // was either session active last tick?
          int c = id(claude_session_pct);
          int x = id(codex_session_pct);
          bool active = (c > 0 || x > 0);
          // last_touch_ms == 0 means "never touched" — without that check the
          // device boots paused and eats the first idle->active transition.
          bool paused = id(last_touch_ms) != 0 &&
                        (millis() - id(last_touch_ms)) < 120000;  // 2 min after touch

          int target = -1;  // -1 = leave as-is
          if (!paused) {
            if (active && !prev_active)       target = 0;  // became active -> Combined home
            else if (!active && prev_active)  target = 3;  // both idle -> Clock
            // Consume prev only when we actually evaluated it; updating it while
            // paused silently discards transitions that happen during the pause.
            prev_active = active;
          }

          if (target >= 0 && target == id(cur_tile)) target = -1;  // already there
          id(switch_target) = target;
      - if:
          condition:
            lambda: 'return id(switch_target) >= 0;'
          then:
            - lvgl.tileview.select:
                id: tiles
                row: 0
                column: !lambda 'return id(switch_target);'
                animated: true
            - lambda: 'id(cur_tile) = id(switch_target);'

font:
  - file: "gfonts://Roboto@700"
    id: font_pct          # big center percentage
    size: 88
  - file: "gfonts://Roboto@700"
    id: font_pct_sm       # combined-tile session % (two per screen, must fit a half)
    size: 50
  - file: "gfonts://Roboto"
    id: font_tiny         # combined-tile reset line (least-glanced, smallest slot)
    size: 18
  - file: "gfonts://Roboto@500"
    id: font_med          # labels
    size: 30
  - file: "gfonts://Roboto"
    id: font_small        # reset countdown
    size: 24
  - file: "gfonts://Montserrat@600"
    id: font_num          # Explorer 3-6-9 numerals (rounded geometric, like the dial)
    size: 72
  - file: "gfonts://Roboto@500"
    id: font_brand        # dial text (ROLEX-style block)
    size: 16

# === Clock hand images (Explorer-style), rotated by the clock interval ===
image:
  - file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/hand_hour.png"
    id: img_hour
    type: RGB
    transparency: alpha_channel
  - file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/hand_minute.png"
    id: img_minute
    type: RGB
    transparency: alpha_channel
  - file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/hand_second.png"
    id: img_second
    type: RGB
    transparency: alpha_channel
  - file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/marker_triangle.png"
    id: img_triangle
    type: RGB
    transparency: alpha_channel
  - file: "https://raw.githubusercontent.com/mathd/claude-codex-monitor/main/firmware/images/baton.png"
    id: img_baton
    type: RGB
    transparency: alpha_channel

# === LVGL UI: two concentric arcs + center readout ===
lvgl:
  displays:
    - lcd
  # The bottom layer is painted behind every page — make it black.
  bottom_layer:
    bg_color: 0x000000
    bg_opa: COVER
  # Swipe left/right between tiles: Claude → Codex → Settings
  widgets:
    - tileview:
        id: tiles
        bg_color: 0x000000
        bg_opa: COVER
        # Keep cur_tile honest: finger swipes change tiles without going through
        # tap-nav or the auto-switch, which otherwise navigate from a stale index.
        on_value:
          then:
            - lambda: |-
                if      (tile == id(tile_combined)) id(cur_tile) = 0;
                else if (tile == id(tile_claude))   id(cur_tile) = 1;
                else if (tile == id(tile_codex))    id(cur_tile) = 2;
                else if (tile == id(tile_clock))    id(cur_tile) = 3;
                else if (tile == id(tile_settings)) id(cur_tile) = 4;
        tiles:
          # ---------- Tile 0: Combined (Claude + Codex, split rings) ----------
          # Left half = Claude, right half = Codex. No divider — the color
          # families (green/blue vs teal/gold) separate the halves. Six data
          # points: each side shows session %, week %, and reset.
          #   Left semicircle:  start 90 -> end 270 (clockwise through 180/left)
          #   Right semicircle: start 270 -> end 90  (clockwise through 0/right)
          # Arcs are full-diameter but only paint their half via the angle range;
          # week = outer, session = inner (mirrors the single-service tiles).
          - id: tile_combined
            row: 0
            column: 0
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              # ---- Claude (left) ----
              - arc:
                  id: arc_cmb_claude_week
                  align: CENTER
                  width: 472
                  height: 472
                  min_value: 0
                  max_value: 100
                  value: 0
                  # Left semicircle, inset 8 deg from the 6 & 12 o'clock seams
                  # so a black gap separates Claude's rings from Codex's.
                  start_angle: 98
                  end_angle: 262
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 16
                  arc_color: 0x203A5C
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 16
                    arc_color: 0x18B4FF
              - arc:
                  id: arc_cmb_claude_session
                  align: CENTER
                  width: 400
                  height: 400
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 98
                  end_angle: 262
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 16
                  arc_color: 0x1E5235
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 16
                    arc_color: 0x2BE06A
              - label:
                  id: lbl_cmb_claude_pct
                  align: CENTER
                  x: -90
                  y: -26
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct_sm
              - label:
                  align: CENTER
                  x: -90
                  y: 18
                  text: "Claude"
                  text_color: 0xBBBBBB
                  text_font: font_small
              - label:
                  id: lbl_cmb_claude_week
                  align: CENTER
                  x: -90
                  y: 46
                  text: "wk --%"
                  text_color: 0x00B0FF
                  text_font: font_small
              - label:
                  id: lbl_cmb_claude_reset
                  align: CENTER
                  x: -90
                  y: 74
                  text: "--"
                  text_color: 0x999999
                  text_font: font_tiny
              # ---- Codex (right) ----
              - arc:
                  id: arc_cmb_codex_week
                  align: CENTER
                  width: 472
                  height: 472
                  min_value: 0
                  max_value: 100
                  value: 0
                  # Right semicircle, inset 8 deg from the 12 & 6 o'clock seams.
                  start_angle: 278
                  end_angle: 82
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 16
                  arc_color: 0x3A2A14
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 16
                    arc_color: 0xFFB020
              - arc:
                  id: arc_cmb_codex_session
                  align: CENTER
                  width: 400
                  height: 400
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 278
                  end_angle: 82
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 16
                  arc_color: 0x14323A
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 16
                    arc_color: 0x20D0D0
              - label:
                  id: lbl_cmb_codex_pct
                  align: CENTER
                  x: 90
                  y: -26
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct_sm
              - label:
                  align: CENTER
                  x: 90
                  y: 18
                  text: "Codex"
                  text_color: 0xBBBBBB
                  text_font: font_small
              - label:
                  id: lbl_cmb_codex_week
                  align: CENTER
                  x: 90
                  y: 46
                  text: "wk --%"
                  text_color: 0x20D0D0
                  text_font: font_small
              - label:
                  id: lbl_cmb_codex_reset
                  align: CENTER
                  x: 90
                  y: 74
                  text: "--"
                  text_color: 0x999999
                  text_font: font_tiny
          # ---------- Tile 1: Claude ----------
          # Two rings (outer→inner): weekly (blue), session (green)
          - id: tile_claude
            row: 0
            column: 1
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              - arc:
                  id: arc_week
                  align: CENTER
                  width: 472
                  height: 472
                  min_value: 0
                  max_value: 100
                  value: 4
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  bg_color: 0x000000
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 20
                  arc_color: 0x203A5C
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 20
                    arc_color: 0x18B4FF
              - arc:
                  id: arc_session
                  align: CENTER
                  width: 396
                  height: 396
                  min_value: 0
                  max_value: 100
                  value: 2
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  bg_color: 0x000000
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 20
                  arc_color: 0x1E5235
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 20
                    arc_color: 0x2BE06A
              - label:
                  id: lbl_pct
                  align: CENTER
                  y: -56
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct
              - label:
                  align: CENTER
                  y: 8
                  text: "Claude Code"
                  text_color: 0xBBBBBB
                  text_font: font_med
              - label:
                  id: lbl_week
                  align: CENTER
                  y: 42
                  text: "week --%"
                  text_color: 0x00B0FF
                  text_font: font_small
              - label:
                  id: lbl_reset
                  align: CENTER
                  y: 76
                  text: "reset --"
                  text_color: 0x999999
                  text_font: font_small
          # ---------- Tile 1: Codex (placeholder until daemon data lands) ----------
          - id: tile_codex
            row: 0
            column: 2
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              - arc:
                  id: arc_codex_week
                  align: CENTER
                  width: 470
                  height: 470
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 26
                  arc_color: 0x3A2A14
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 26
                    arc_color: 0xFFB020
              - arc:
                  id: arc_codex_session
                  align: CENTER
                  width: 388
                  height: 388
                  min_value: 0
                  max_value: 100
                  value: 0
                  start_angle: 0
                  end_angle: 360
                  adjustable: false
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  arc_rounded: true
                  arc_width: 26
                  arc_color: 0x14323A
                  arc_opa: COVER
                  indicator:
                    arc_rounded: true
                    arc_width: 26
                    arc_color: 0x20D0D0
              - label:
                  id: lbl_codex_pct
                  align: CENTER
                  y: -34
                  text: "--%"
                  text_color: 0xFFFFFF
                  text_font: font_pct
              - label:
                  align: CENTER
                  y: 38
                  text: "Codex"
                  text_color: 0xBBBBBB
                  text_font: font_med
              - label:
                  id: lbl_codex_week
                  align: CENTER
                  y: 80
                  text: "week --%"
                  text_color: 0x20D0D0
                  text_font: font_small
              - label:
                  id: lbl_codex_reset
                  align: CENTER
                  y: 112
                  text: "reset --"
                  text_color: 0x999999
                  text_font: font_small
          # ---------- Tile 2: Clock (Rolex Explorer I homage) ----------
          - id: tile_clock
            row: 0
            column: 3
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              # The dial + hands via a meter widget.
              - meter:
                  id: clock_meter
                  align: CENTER
                  width: 480
                  height: 480
                  bg_opa: TRANSP
                  border_width: 0
                  text_color: 0xFFFFFF
                  scales:
                    # fine minute ticks around the rim
                    - range_from: 0
                      range_to: 60
                      angle_range: 360
                      rotation: 270
                      ticks:
                        count: 60
                        length: 12
                        width: 2
                        color: 0xAAAAAA
              # Triangle marker at 12 (Explorer signature)
              - image:
                  src: img_triangle
                  align: CENTER
                  y: -198
              # Baton hour markers at 1,2,4,5,7,8,10,11 (skip 3/6/9 numerals + 12 triangle).
              # baton.png 24x210, pivot (12,210); y:-105 puts pivot at dial center; rotate by hour angle.
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 30 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 60 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 120 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 150 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 210 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 240 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 300 }
              - image: { src: img_baton, align: CENTER, y: -105, pivot_x: 12, pivot_y: 210, angle: 330 }
              # 3 / 6 / 9 Arabic numerals
              - label:
                  align: CENTER
                  x: 172
                  y: 0
                  text: "3"
                  text_color: 0xFFFFFF
                  text_font: font_num
              - label:
                  align: CENTER
                  x: 0
                  y: 168
                  text: "6"
                  text_color: 0xFFFFFF
                  text_font: font_num
              - label:
                  align: CENTER
                  x: -172
                  y: 0
                  text: "9"
                  text_color: 0xFFFFFF
                  text_font: font_num
              # Crown/brand text block (upper dial, clear of the hands)
              - label:
                  align: CENTER
                  y: -108
                  text: "ROLEX"
                  text_color: 0xFFFFFF
                  text_font: font_brand
              - label:
                  align: CENTER
                  y: -86
                  text: "OYSTER PERPETUAL"
                  text_color: 0xBBBBBB
                  text_font: font_brand
              # EXPLORER text (lower dial, above 6 — kept clear of the hands)
              - label:
                  align: CENTER
                  y: 84
                  text: "EXPLORER"
                  text_color: 0xDDDDDD
                  text_font: font_brand
              # --- Hands (rotating images, on top of dial text). pivot = the
              #     hand's base pixel; y offset puts that pivot at the dial center. ---
              - image:
                  id: clk_hour
                  src: img_hour
                  align: CENTER
                  y: -75            # 150/2 → base pixel lands at center
                  pivot_x: 30
                  pivot_y: 150
              - image:
                  id: clk_minute
                  src: img_minute
                  align: CENTER
                  y: -105           # 210/2
                  pivot_x: 20
                  pivot_y: 210
              - image:
                  id: clk_second
                  src: img_second
                  align: CENTER
                  y: -55            # pivot 170, image 230 → (230/2 - 170) = -55 offset
                  pivot_x: 12
                  pivot_y: 170
              # center cap (over the hands)
              - obj:
                  align: CENTER
                  width: 20
                  height: 20
                  radius: 10
                  bg_color: 0xFFFFFF
                  bg_opa: COVER
                  border_width: 0
          # ---------- Tile 3: Settings ----------
          - id: tile_settings
            row: 0
            column: 4
            dir: HOR
            bg_color: 0x000000
            bg_opa: COVER
            widgets:
              - label:
                  align: TOP_MID
                  y: 70
                  text: "Settings"
                  text_color: 0xFFFFFF
                  text_font: font_med
              # Brightness label + slider
              - label:
                  id: lbl_bright
                  align: CENTER
                  y: -70
                  text: "Brightness 100%"
                  text_color: 0xBBBBBB
                  text_font: font_small
              - slider:
                  id: sld_bright
                  align: CENTER
                  y: -30
                  width: 280
                  height: 18
                  min_value: 10
                  max_value: 100
                  value: 100
                  on_value:
                    - light.turn_on:
                        id: backlight
                        brightness: !lambda 'return x / 100.0;'
                    - lvgl.label.update:
                        id: lbl_bright
                        text: !lambda 'static char b[20]; snprintf(b, sizeof(b), "Brightness %d%%", (int)x); return b;'
              # Reset-time format toggle
              - button:
                  id: btn_reset_fmt
                  align: CENTER
                  y: 36
                  width: 240
                  height: 46
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_reset_fmt
                        align: CENTER
                        text: "Reset: Countdown"
                        text_font: font_small
                  on_click:
                    - lambda: 'id(reset_show_clock) = !id(reset_show_clock);'
                    - lvgl.label.update:
                        id: lbl_reset_fmt
                        text: !lambda 'return id(reset_show_clock) ? std::string("Reset: Clock") : std::string("Reset: Countdown");'
